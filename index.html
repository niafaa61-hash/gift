<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Gift Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Caveat:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 85%;
            width: 320px;
            transition: all 0.5s ease;
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .heart-text {
            color: #b30000;
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            margin-top: 0;
            margin-bottom: 15px;
            display: inline-block;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid #333;
            border-radius: 30px;
            cursor: pointer;
            background-color: #fff;
            color: #333;
            transition: all 0.2s ease;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #fff;
        }

        #noBtn {
            position: absolute;
            right: 20px;
            z-index: 10;
        }

        .celebration {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 340px;
            text-align: center;
            z-index: 5;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .celebration img {
            width: 85%;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-top: 15px;
            transform: rotate(-3deg);
        }

        .celebration h2 {
            color: #b30000;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .celebration p {
            color: #444;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .rose-petal {
            position: fixed;
            top: -20px;
            font-size: 24px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>Hello</h1>
        <div class="heart-text">My Love!</div>
        <p>تحبيني؟ 🥺</p>
        <div class="btn-container">
            <button id="yesBtn">احبك ❤️</button>
            <button id="noBtn">ماحبك 😅</button>
        </div>
    </div>

    <div class="celebration" id="celebrationSection">
        <h2>يديمك لي يا رب! 💖</h2>
        <p>The roses are jealous of you</p>
        <img src="rose.jpg" alt="Beautiful Roses">
    </div>

    <audio id="bgMusic" src="song.mp3" preload="auto"></audio>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainContainer = document.getElementById('mainContainer');
        const celebrationSection = document.getElementById('celebrationSection');
        const bgMusic = document.getElementById('bgMusic');

        const flowers = ['🌹', '🌸', '💖', '✨', '❤️'];

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('rose-petal');
            petal.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            petal.style.left = Math.random() * 100 + 'vw';
            
            const size = Math.random() * 15 + 15;
            petal.style.fontSize = size + 'px';
            
            const duration = Math.random() * 3 + 3;
            petal.style.animationDuration = duration + 's';
            
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        function moveButton() {
            const padding = 20;
            const maxWidth = window.innerWidth - noBtn.offsetWidth - padding;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxHeight));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        yesBtn.addEventListener('click', () => {
            mainContainer.style.display = 'none';
            celebrationSection.style.display = 'block';

            if (bgMusic) {
                bgMusic.play().catch(error => {
                    console.log("Audio play failed, needs interaction:", error);
                });
            }

            setInterval(createPetal, 150);
        });
    </script>

</body>
</html>
