<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The roses are jealous of you</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
            position: relative;
            color: #fff;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 400px;
            z-index: 10;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ff4d6d;
            text-shadow: 0 2px 10px rgba(255, 77, 109, 0.3);
        }
        .rose-img {
            width: 150px;
            height: 150px;
            margin: 15px auto;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <!-- الموسيقى الخلفية للمشروع -->
    <audio id="bgMusic" loop src="song.mp3"></audio>

    <div class="container">
        <!-- النص الرئيسي الجديد هنا تم تعديله -->
        <h1 id="x9m3aa">The roses are jealous of you</h1>
        
        <!-- صورة الوردة المضافة للمشروع -->
        <img class="rose-img" src="rose.jpg" alt="Rose">

        <!-- أزرار لعبة نعم أو لا التفاعلية -->
        <div class="buttons">
            <button id="yesBtn" onclick="playGift()">Yes</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <script>
        // تشغيل الموسيقى عند الضغط على نعم والتفاعل مع اللعبة
        function playGift() {
            var music = document.getElementById('bgMusic');
            music.play().catch(function(error) {
                console.log("Music play prevented, requires user interaction first.");
            });
            alert("I knew it! ❤️");
        }

        // حركة زر "لا" الذكي لمنع الضغط عليه وتجنب الخطأ
        function moveNoButton() {
            var noBtn = document.getElementById('noBtn');
            var container = document.querySelector('.container');
            
            var maxX = container.clientWidth - noBtn.clientWidth - 20;
            var maxY = container.clientHeight - noBtn.clientHeight - 20;
            
            var randomX = Math.floor(Math.random() * maxX);
            var randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
